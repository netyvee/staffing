name: QA Gate

# W-STAFFING-FRAMEWORK-ADOPTION: build smoke + division isolation + visual-completion
# on every push/PR. Content gate stays CRM-side (StructuralFidelity + provenance in
# netyvee/app); this proves the site builds on its pinned framework, that no foreign
# division phone/domain appears in public output, and that the visual-completion hard
# gates hold (logo/favicon/og/single-sticky/footer-clearance/mobile-nav-a11y/etc.).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Actions economy (CI-ECON-01 / B-CI-02) ───────────────────────────────────
# Collapse superseded runs. The group is keyed on the workflow + git ref, so:
#   • the CRM auto-publish burst (many rapid [crm-auto] pushes to main) collapses
#     to ONE effective run instead of ~8 (all share refs/heads/main);
#   • a newer push to a PR branch cancels its own predecessor's in-progress run;
#   • DIFFERENT refs never cancel each other (each PR / branch is its own group).
# SAFE on main. This used to read "because this workflow is a CHECK ONLY — it has
# no deploy job", which stopped being true when the `deploy` job was added, so the
# current reason is stated rather than a stale one left in place: that job VERIFIES
# a deployment, it does not perform one. Vercel deploys on push independently of
# Actions, so cancelling a superseded run never interrupts a deployment. The cost is
# that the superseded commit's verification is abandoned — acceptable, because the
# newer commit on the same branch is verified moments later. This is per-repository
# and cannot affect netyvee/app's ci.yml deploy (groups do not cross repositories).
# (Proven identical on netyvee/care PR#1 — see AUDIT/ACTIONS-ECONOMY-TIER2-EVIDENCE.md.)
concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: build + isolation + visual-completion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Actions economy (CI-ECON-01 §7.1): cache the npm download cache (~/.npm),
          # keyed on OS + package-lock.json hash (auto-invalidated on lockfile change).
          # Caches registry tarballs; the @vigil/web-framework git-tag pin may still be
          # re-fetched (git deps aren't in ~/.npm), so the benefit is partial but real.
          # Proven cold/warm/invalidation on netyvee/web-framework — see
          # AUDIT/ACTIONS-ECONOMY-TIER2-EVIDENCE.md §7.1.
          cache: 'npm'
      - name: Lockfile must install on the deploy platform (linux-x64)
        # Fetched from the framework at a pinned tag rather than node_modules, so this
        # runs BEFORE install and is independent of this repo's framework pin.
        #
        # Why: netyvee/main's lockfile recorded ONE platform binary
        # (@next/swc-win32-x64-msvc) instead of nine, because it was regenerated on
        # Windows over an existing node_modules. Vercel builds on linux-x64 with npm ci,
        # so the Linux SWC binary was absent and every deployment failed — while local
        # and CI builds passed. This repo's lockfile is currently clean; the check is
        # here so it stays that way.
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/lockfile-platform-check.mjs \
            https://raw.githubusercontent.com/netyvee/web-framework/v0.5.4/scripts/lockfile-platform-check.mjs
          node /tmp/lockfile-platform-check.mjs
      - name: Install (npm ci — exactly what Vercel runs, never npm install)
        # `npm install` may rewrite the lockfile to suit this runner, which makes CI
        # validate a dependency tree the deploy never receives. That divergence is how a
        # green QA gate coexisted with six failed deployments on netyvee/main.
        # Verified with `npm ci --dry-run` before this change: lockfile is in sync.
        run: npm ci
      - name: Build
        run: npm run build
      - name: Content SEO integrity (content/pages/*.json)
        run: node scripts/content-seo-check.mjs
      - name: Division isolation (built output)
        run: node node_modules/@vigil/web-framework/scripts/division-isolation-check.mjs --mode built --own care_staffing
      - name: Visual completion gates
        run: node node_modules/@vigil/web-framework/scripts/visual-completion-check.mjs --site .
      - name: Content completeness (substance gate — orphans / broken links / contracts / SEO)
        run: node node_modules/@vigil/web-framework/scripts/content-completeness-check.mjs --site .

  deploy:
    name: deploy actually succeeded
    # EXPLICIT PERMISSIONS, not the repo default. vigil-cleaning's first run of this
    # job failed with GitHub API 403 "Resource not accessible by integration" — its
    # default workflow token carries no deployments scope. Declaring it here makes the
    # job behave identically in every repo instead of silently depending on a per-repo
    # setting nobody reads.
    permissions:
      contents: read
      deployments: read
    # DELIBERATELY NOT `needs: qa`, and this repo is why. Its QA gate has been RED
    # since 2026-07-19 and Vercel has gone on deploying regardless — the two systems
    # are independent. Gating verification behind a green QA would therefore skip it
    # on exactly the deploys most likely to be broken, which is the opposite of the
    # point. "Did the code pass our checks" and "did the deploy succeed" are two
    # separate facts; coupling them hides the second whenever the first fails.
    #
    # Push only: a pull_request build has no production deployment to verify.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Poll the Vercel deployment to a terminal state
        # CLAUDE.md Rule 59 / D-094. A deploy is reported successful ONLY after a
        # deployment status has been polled to a terminal state and read. A push, an
        # accepted commit, a triggered workflow, a local build and a green CI run are
        # each insufficient — and so is not having noticed a deployment record.
        #
        # This repo has direct history here: on 2026-07-19 its QA gate went RED and
        # Vercel deployed anyway. That decoupling is what this job closes from the
        # other side — CI now fails when the DEPLOY fails, rather than the two
        # reporting independently and neither being authoritative.
        #
        # Needs only GITHUB_TOKEN — Vercel reports its outcome to the GitHub
        # deployments API, so no Vercel credential is involved.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -sSfL -o /tmp/deploy-verify.mjs \
            https://raw.githubusercontent.com/netyvee/web-framework/v0.5.4/scripts/deploy-verify.mjs
          node /tmp/deploy-verify.mjs \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}" \
            --timeout 900
